<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CarLog - 車両整備管理システム</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #059669;
            --accent: #f59e0b;
            --danger: #dc2626;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a2f5a 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ログイン画面 */
        #loginScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .login-card h1 { font-size: 2em; color: var(--primary); margin-bottom: 10px; }
        .login-card p { color: var(--text-muted); margin-bottom: 30px; }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 20px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            color: var(--text);
            transition: all 0.3s ease;
        }

        .btn-google:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
            transform: translateY(-2px);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        /* メインアプリ */
        #mainApp { display: none; }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 20px 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(30,58,138,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left h1 { font-size: 2em; margin-bottom: 3px; }
        .header-left p { font-size: 0.9em; opacity: 0.9; }

        .header-right { display: flex; align-items: center; gap: 15px; }

        .user-info { font-size: 0.9em; opacity: 0.9; }

        .btn-logout {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.3s ease;
        }

        .btn-logout:hover { background: rgba(255,255,255,0.3); }

        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) { .main-grid { grid-template-columns: minmax(0, 1fr); } }

        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 { font-size: 1.1em; margin-bottom: 15px; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .vehicle-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .vehicle-item {
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 0.95em;
        }

        .vehicle-item:hover { border-color: var(--primary-light); background: var(--light); transform: translateX(5px); }
        .vehicle-item.active { background: var(--primary); color: white; border-color: var(--primary); font-weight: 600; }

        .vehicle-info { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
        .vehicle-name { flex: 1; font-weight: 500; }
        .vehicle-type { font-size: 0.85em; opacity: 0.8; padding: 3px 8px; background: var(--light); border-radius: 4px; }
        .vehicle-item.active .vehicle-type { background: rgba(255,255,255,0.2); }

        .btn-add-vehicle {
            width: 100%;
            padding: 12px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .btn-add-vehicle:hover { background: #047857; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(5,150,105,0.3); }

        .content { display: flex; flex-direction: column; gap: 25px; }

        .tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .tab-btn:hover { color: var(--primary); background: var(--light); }
        .tab-btn.active { background: var(--primary); color: white; }
        .tab-btn .tab-icon { margin-right: 6px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
        }

        .card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .card-title { font-size: 1.3em; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 10px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }

        .stat-card {
            background: linear-gradient(135deg, var(--light) 0%, white 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .stat-label { font-size: 0.9em; color: var(--text-muted); margin-bottom: 8px; }
        .stat-value { font-size: 1.8em; font-weight: bold; color: var(--primary); }

        .form-group { margin-bottom: 20px; }

        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text); font-size: 0.95em; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary { background: var(--primary-light); color: white; }
        .btn-primary:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30,58,138,0.3); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #047857; transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: white; padding: 8px 12px; font-size: 0.85em; }
        .btn-danger:hover { background: #991b1b; }
        .btn-block { width: 100%; justify-content: center; }

        .records-list { display: flex; flex-direction: column; gap: 15px; }

        .record-item {
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 10px;
            background: var(--light);
            transition: all 0.3s ease;
        }

        .record-item:hover { border-color: var(--primary-light); box-shadow: 0 4px 12px rgba(59,130,246,0.1); }

        .record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .record-date { font-weight: 600; color: var(--primary); }
        .record-cost { font-size: 1.2em; font-weight: bold; color: var(--accent); }
        .record-content { color: var(--text); margin-bottom: 10px; line-height: 1.5; }
        .record-category { display: inline-block; padding: 4px 12px; background: var(--primary); color: white; border-radius: 20px; font-size: 0.85em; font-weight: 600; }

        .chart-container { background: var(--light); padding: 20px; border-radius: 10px; margin: 20px 0; max-height: 400px; position: relative; }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
        .empty-state h3 { color: var(--text); margin-bottom: 10px; font-size: 1.2em; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; animation: fadeIn 0.3s ease; }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-header { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; color: var(--primary); }

        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-close:hover { color: var(--text); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .badge-success { background: rgba(5,150,105,0.1); color: var(--secondary); }
        .badge-warning { background: rgba(245,158,11,0.1); color: var(--accent); }
        .badge-danger { background: rgba(220,38,38,0.1); color: var(--danger); }

        .mt-20 { margin-top: 20px; }
        .text-center { text-align: center; }
        .flex { display: flex; gap: 10px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-warning { background: #fef3c7; border-left: 4px solid var(--accent); color: #92400e; }
        .alert-danger { background: #fee2e2; border-left: 4px solid var(--danger); color: #7f1d1d; }
        .alert-success { background: #d1fae5; border-left: 4px solid var(--secondary); color: #065f46; }
        .alert-icon { font-size: 1.5em; flex-shrink: 0; }
        .alert-content { flex: 1; }
        .alert-title { font-weight: 600; margin-bottom: 3px; }
        .alert-message { font-size: 0.9em; opacity: 0.9; }

        /* ローディング */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        /* ===== スマホ向けレイアウト ===== */
        @media (max-width: 768px) {
            .container { padding: 12px; padding-bottom: 95px; }

            /* ヘッダーをコンパクトに */
            .header { padding: 15px 18px; margin-bottom: 15px; }
            .header-left h1 { font-size: 1.4em; }
            .header-left p { display: none; }
            .user-info { display: none; }
            .btn-logout { padding: 10px 14px; min-height: 44px; }

            .main-grid { gap: 15px; margin-bottom: 0; }
            .content { gap: 15px; }

            /* 車両一覧を横スクロールの選択バーに */
            .sidebar { position: static; padding: 12px 15px; }
            .sidebar h3 { font-size: 1em; margin-bottom: 10px; }
            .vehicle-list {
                flex-direction: row;
                overflow-x: auto;
                gap: 8px;
                margin-bottom: 10px;
                padding-bottom: 4px;
                -webkit-overflow-scrolling: touch;
            }
            .vehicle-item {
                flex: 0 0 auto;
                white-space: nowrap;
                padding: 10px 14px;
                min-height: 44px;
                display: flex;
                align-items: center;
            }
            .vehicle-item:hover { transform: none; }
            .btn-add-vehicle { padding: 12px; min-height: 48px; }

            /* タブを画面下部に固定（アプリ風ボトムナビ） */
            .tabs {
                position: fixed;
                bottom: 0; left: 0; right: 0;
                z-index: 500;
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
                padding: 6px 8px;
                padding-bottom: calc(6px + env(safe-area-inset-bottom));
                gap: 4px;
            }
            .tab-btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 2px;
                padding: 8px 2px;
                min-height: 56px;
            }
            .tab-btn .tab-icon { font-size: 1.4em; margin-right: 0; }
            .tab-btn .tab-label { font-size: 0.65em; }

            /* カード・統計 */
            .card { padding: 18px 15px; border-radius: 10px; }
            .card-title { font-size: 1.15em; margin-bottom: 15px; }
            .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
            .stat-card { padding: 14px; }
            .stat-label { font-size: 0.8em; }
            .stat-value { font-size: 1.3em; }

            /* 入力をタップしやすく（16pxでiPhoneの自動ズームも防止） */
            input, select, textarea { font-size: 16px; padding: 14px; }
            input, select { min-height: 48px; }
            label { font-size: 0.9em; }
            .btn { min-height: 48px; padding: 12px 20px; }

            /* 記録一覧：削除ボタンの誤タップ防止 */
            .record-item { padding: 15px; }
            .record-header { flex-wrap: wrap; gap: 8px; }
            .btn-danger { min-height: 40px; padding: 8px 16px; }

            /* モーダルを下から出るシート式に */
            .modal { align-items: flex-end; }
            .modal-content {
                width: 100%;
                max-width: 100%;
                border-radius: 16px 16px 0 0;
                max-height: 88vh;
                padding: 22px 18px;
                padding-bottom: calc(22px + env(safe-area-inset-bottom));
            }

            .alert { padding: 12px 14px; gap: 10px; }
            .alert-title { font-size: 0.95em; }
            .alert-message { font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <!-- ログイン画面 -->
    <div id="loginScreen">
        <div class="login-card">
            <h1>🚗 CarLog</h1>
            <p>車両整備・費用管理システム<br>Googleアカウントでログインしてください</p>
            <button class="btn-google" onclick="signIn()">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Googleでログイン
            </button>
        </div>
    </div>

    <!-- メインアプリ -->
    <div id="mainApp">
        <div class="container">
            <!-- Header -->
            <div class="header">
                <div class="header-left">
                    <h1>🚗 CarLog</h1>
                    <p>あなたの車両整備・費用管理システム</p>
                </div>
                <div class="header-right">
                    <span class="user-info" id="userInfo"></span>
                    <button class="btn-logout" onclick="signOut()">ログアウト</button>
                </div>
            </div>

            <!-- Main Layout -->
            <div class="main-grid">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <h3>🚙 車両一覧</h3>
                    <div class="vehicle-list" id="vehicleList"></div>
                    <button class="btn-add-vehicle" onclick="openAddVehicleModal()">+ 新しい車両を追加</button>
                </aside>

                <!-- Content -->
                <div class="content">
                    <div class="tabs">
                        <button class="tab-btn active" onclick="switchTab('dashboard', event)"><span class="tab-icon">📊</span><span class="tab-label">ダッシュボード</span></button>
                        <button class="tab-btn" onclick="switchTab('records', event)"><span class="tab-icon">📝</span><span class="tab-label">整備記録</span></button>
                        <button class="tab-btn" onclick="switchTab('costs', event)"><span class="tab-icon">💰</span><span class="tab-label">費用分析</span></button>
                        <button class="tab-btn" onclick="switchTab('vehicle-info', event)"><span class="tab-icon">ℹ️</span><span class="tab-label">車両情報</span></button>
                    </div>

                    <!-- Dashboard Tab -->
                    <div id="dashboard" class="tab-content active">
                        <div id="inspectionAlert"></div>
                        <div class="stats-grid" id="statsGrid"></div>
                        <div class="card">
                            <div class="card-title">🔧 最近の整備記録</div>
                            <div id="recentRecords"></div>
                        </div>
                    </div>

                    <!-- Records Tab -->
                    <div id="records" class="tab-content">
                        <div class="card">
                            <div class="card-title">整備記録を追加</div>
                            <form id="recordForm" onsubmit="addRecord(event)">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>整備日</label>
                                        <input type="date" id="recordDate" required>
                                    </div>
                                    <div class="form-group">
                                        <label>費用</label>
                                        <input type="number" id="recordCost" placeholder="0" min="0" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>カテゴリ</label>
                                    <select id="recordCategory" required>
                                        <option value="">選択してください</option>
                                        <option value="オイル交換">オイル交換</option>
                                        <option value="タイヤ交換">タイヤ交換</option>
                                        <option value="プラグ交換">プラグ交換</option>
                                        <option value="バッテリー交換">バッテリー交換</option>
                                        <option value="車検費用">車検費用</option>
                                        <option value="点検">点検</option>
                                        <option value="修理">修理</option>
                                        <option value="カスタム">カスタム</option>
                                        <option value="パーツ交換">パーツ交換</option>
                                        <option value="その他">その他</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>走行距離（km）</label>
                                    <input type="number" id="recordMileage" placeholder="0" min="0">
                                </div>
                                <div class="form-group">
                                    <label>内容・メモ</label>
                                    <textarea id="recordNotes" placeholder="整備内容の詳細..." rows="4"></textarea>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">記録を保存</button>
                            </form>
                        </div>
                        <div class="card mt-20">
                            <div class="card-title">整備記録一覧</div>
                            <div class="records-list" id="recordsList"></div>
                        </div>
                    </div>

                    <!-- Costs Tab -->
                    <div id="costs" class="tab-content">
                        <div class="card">
                            <div class="card-title">💰 費用分析</div>
                            <div class="stats-grid" id="costStatsGrid"></div>
                            <div class="mt-20">
                                <h3 style="color: var(--primary); margin-bottom: 15px;">カテゴリ別費用</h3>
                                <div id="categoryCosts"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Vehicle Info Tab -->
                    <div id="vehicle-info" class="tab-content">
                        <div class="card">
                            <div class="card-title">🚗 車両情報</div>
                            <form id="vehicleForm" onsubmit="updateVehicleInfo(event)">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>車両名</label>
                                        <input type="text" id="vehicleName" required>
                                    </div>
                                    <div class="form-group">
                                        <label>車種</label>
                                        <select id="vehicleType" required>
                                            <option value="">選択してください</option>
                                            <option value="軽自動車">軽自動車</option>
                                            <option value="普通自動車">普通自動車</option>
                                            <option value="SUV">SUV</option>
                                            <option value="バイク">バイク</option>
                                            <option value="その他">その他</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>メーカー</label>
                                        <input type="text" id="vehicleMaker" placeholder="例：トヨタ">
                                    </div>
                                    <div class="form-group">
                                        <label>モデル</label>
                                        <input type="text" id="vehicleModel" placeholder="例：アクア">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>年式</label>
                                        <input type="number" id="vehicleYear" placeholder="2020" min="1900">
                                    </div>
                                    <div class="form-group">
                                        <label>型式</label>
                                        <input type="text" id="vehicleModelCode" placeholder="例：ZVW50">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>ナンバープレート</label>
                                        <input type="text" id="vehicleRegNumber" placeholder="例：○○-1234">
                                    </div>
                                    <div class="form-group">
                                        <label>次回車検日</label>
                                        <input type="date" id="vehicleInspectionDate">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>現在の走行距離（km）</label>
                                    <input type="number" id="vehicleMileage" placeholder="0" min="0" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">情報を更新</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal" id="addVehicleModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAddVehicleModal()">×</button>
            <div class="modal-header">新しい車両を追加</div>
            <form id="newVehicleForm" onsubmit="addVehicle(event)">
                <div class="form-group">
                    <label>車両名</label>
                    <input type="text" id="newVehicleName" placeholder="例：トヨタ プリウス" required>
                </div>
                <div class="form-group">
                    <label>車種</label>
                    <select id="newVehicleType" required>
                        <option value="">選択してください</option>
                        <option value="軽自動車">軽自動車</option>
                        <option value="普通自動車">普通自動車</option>
                        <option value="SUV">SUV</option>
                        <option value="バイク">バイク</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>メーカー</label>
                    <input type="text" id="newVehicleMaker" placeholder="例：トヨタ">
                </div>
                <div class="form-group">
                    <label>モデル</label>
                    <input type="text" id="newVehicleModel" placeholder="例：アクア">
                </div>
                <div class="form-group">
                    <label>年式</label>
                    <input type="number" id="newVehicleYear" placeholder="2020" min="1900">
                </div>
                <div class="form-group">
                    <label>型式</label>
                    <input type="text" id="newVehicleModelCode" placeholder="例：ZVW50">
                </div>
                <div class="form-group">
                    <label>次回車検日</label>
                    <input type="date" id="newVehicleInspectionDate">
                </div>
                <div class="form-group">
                    <label>現在の走行距離（km）</label>
                    <input type="number" id="newVehicleMileage" placeholder="0" min="0" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">車両を追加</button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
        // Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyAUDjWu-EiJ3HHx67w834Anm9SJ32Vs_xU",
            authDomain: "carlog-2007f.firebaseapp.com",
            projectId: "carlog-2007f",
            storageBucket: "carlog-2007f.firebasestorage.app",
            messagingSenderId: "283882634278",
            appId: "1:283882634278:web:8d70c2a2d8d11935917ae7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;

        let appData = {
            vehicles: [],
            records: [],
            currentVehicleId: null
        };

        // Google ログイン
        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert('ログインに失敗しました: ' + err.message));
        }

        function signOut() {
            auth.signOut();
        }

        // 認証状態の監視
        auth.onAuthStateChanged(async user => {
            currentUser = user;
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userInfo').textContent = user.displayName || user.email;
                await loadData();
                renderAll();
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('recordDate').value = today;
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('mainApp').style.display = 'none';
            }
        });

        // Firestore からデータを読み込む
        async function loadData() {
            if (!currentUser) return;
            try {
                const doc = await db.collection('users').doc(currentUser.uid).collection('data').doc('appData').get();
                if (doc.exists) {
                    appData = doc.data();
                } else {
                    // 初回: デモデータなし（空の状態から始める）
                    appData = { vehicles: [], records: [], currentVehicleId: null };
                    await saveData();
                }
            } catch (e) {
                console.error('データ読み込みエラー:', e);
            }
        }

        // Firestore へデータを保存
        async function saveData() {
            if (!currentUser) return;
            try {
                await db.collection('users').doc(currentUser.uid).collection('data').doc('appData').set(appData);
            } catch (e) {
                console.error('データ保存エラー:', e);
            }
        }

        // 全UI更新
        function renderAll() {
            renderVehicles();
            updateDashboard();
            renderRecords();
            renderCosts();
            loadVehicleInfo();
        }

        // UI レンダリング
        function renderVehicles() {
            const list = document.getElementById('vehicleList');
            if (appData.vehicles.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>車両がありません</p></div>';
                return;
            }
            list.innerHTML = appData.vehicles.map(v => `
                <div class="vehicle-item ${v.id === appData.currentVehicleId ? 'active' : ''}" onclick="selectVehicle(${v.id})">
                    <div class="vehicle-info">
                        <div class="vehicle-name">${escapeHtml(v.name)}</div>
                        <div class="vehicle-type">${escapeHtml(v.type)}</div>
                    </div>
                </div>
            `).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        async function selectVehicle(id) {
            appData.currentVehicleId = id;
            await saveData();
            renderAll();
        }

        function updateDashboard() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) {
                document.getElementById('inspectionAlert').innerHTML = '';
                document.getElementById('statsGrid').innerHTML = '<div class="empty-state"><p>左の車両一覧から車両を選択してください</p></div>';
                document.getElementById('recentRecords').innerHTML = '';
                return;
            }

            const vehicleRecords = appData.records.filter(r => r.vehicleId === vehicle.id);
            const totalCost = vehicleRecords.reduce((sum, r) => sum + r.cost, 0);
            const monthRecords = vehicleRecords.filter(r => {
                const date = new Date(r.date);
                const now = new Date();
                return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
            });
            const monthCost = monthRecords.reduce((sum, r) => sum + r.cost, 0);

            // 車検日アラート
            const inspectionAlert = document.getElementById('inspectionAlert');
            if (vehicle.inspectionDate) {
                const inspectionDate = new Date(vehicle.inspectionDate);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const daysUntilInspection = Math.floor((inspectionDate - today) / (1000 * 60 * 60 * 24));

                let alertHTML = '';
                if (daysUntilInspection < 0) {
                    alertHTML = `<div class="alert alert-danger"><div class="alert-icon">⚠️</div><div class="alert-content"><div class="alert-title">車検が期限切れです！</div><div class="alert-message">車検日：${escapeHtml(vehicle.inspectionDate)} - 早急に手続きを進めてください</div></div></div>`;
                } else if (daysUntilInspection === 0) {
                    alertHTML = `<div class="alert alert-danger"><div class="alert-icon">🚨</div><div class="alert-content"><div class="alert-title">本日が車検日です！</div><div class="alert-message">車検手続きを忘れずに行ってください</div></div></div>`;
                } else if (daysUntilInspection <= 30) {
                    alertHTML = `<div class="alert alert-danger"><div class="alert-icon">⚠️</div><div class="alert-content"><div class="alert-title">車検期限まで${daysUntilInspection}日です！</div><div class="alert-message">車検日：${escapeHtml(vehicle.inspectionDate)} - 早めに予約することをお勧めします</div></div></div>`;
                } else if (daysUntilInspection <= 60) {
                    alertHTML = `<div class="alert alert-warning"><div class="alert-icon">ℹ️</div><div class="alert-content"><div class="alert-title">車検期限まで${daysUntilInspection}日です</div><div class="alert-message">車検日：${escapeHtml(vehicle.inspectionDate)} - そろそろ予約の準備をしましょう</div></div></div>`;
                } else if (daysUntilInspection <= 90) {
                    alertHTML = `<div class="alert alert-success"><div class="alert-icon">✓</div><div class="alert-content"><div class="alert-title">次の車検まで${daysUntilInspection}日あります</div><div class="alert-message">車検日：${escapeHtml(vehicle.inspectionDate)}</div></div></div>`;
                }
                inspectionAlert.innerHTML = alertHTML;
            } else {
                inspectionAlert.innerHTML = `<div class="alert alert-warning"><div class="alert-icon">⚠️</div><div class="alert-content"><div class="alert-title">車検日が登録されていません</div><div class="alert-message">車両情報から次回車検日を設定してください</div></div></div>`;
            }

            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-label">現在の走行距離</div><div class="stat-value">${vehicle.mileage.toLocaleString()} km</div></div>
                <div class="stat-card"><div class="stat-label">総整備費用</div><div class="stat-value">¥${totalCost.toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">今月の費用</div><div class="stat-value">¥${monthCost.toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">整備記録数</div><div class="stat-value">${vehicleRecords.length}</div></div>
            `;

            const recentRecords = document.getElementById('recentRecords');
            const sorted = [...vehicleRecords].sort((a, b) => b.date.localeCompare(a.date));
            if (sorted.length === 0) {
                recentRecords.innerHTML = '<div class="empty-state"><p>整備記録がありません</p></div>';
            } else {
                recentRecords.innerHTML = sorted.slice(0, 3).map(r => `
                    <div class="record-item">
                        <div class="record-header">
                            <div><div class="record-date">${escapeHtml(r.date)}</div><span class="record-category">${escapeHtml(r.category)}</span></div>
                            <div class="record-cost">¥${r.cost.toLocaleString()}</div>
                        </div>
                        <div class="record-content">${escapeHtml(r.notes)}</div>
                        <small style="color: var(--text-muted);">走行距離: ${r.mileage} km</small>
                    </div>
                `).join('');
            }
        }

        function renderRecords() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            const vehicleRecords = [...appData.records.filter(r => r.vehicleId === vehicle.id)]
                .sort((a, b) => b.date.localeCompare(a.date));
            const recordsList = document.getElementById('recordsList');

            if (vehicleRecords.length === 0) {
                recordsList.innerHTML = '<div class="empty-state"><h3>整備記録がありません</h3><p>最初の整備記録を追加しましょう</p></div>';
            } else {
                recordsList.innerHTML = vehicleRecords.map(r => `
                    <div class="record-item">
                        <div class="record-header">
                            <div><div class="record-date">${escapeHtml(r.date)}</div><span class="record-category">${escapeHtml(r.category)}</span></div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div class="record-cost">¥${r.cost.toLocaleString()}</div>
                                <button class="btn btn-danger" onclick="deleteRecord(${r.id})">削除</button>
                            </div>
                        </div>
                        <div class="record-content">${escapeHtml(r.notes)}</div>
                        <small style="color: var(--text-muted);">走行距離: ${r.mileage} km</small>
                    </div>
                `).join('');
            }
        }

        function renderCosts() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            const vehicleRecords = appData.records.filter(r => r.vehicleId === vehicle.id);
            const totalCost = vehicleRecords.reduce((sum, r) => sum + r.cost, 0);
            const avgCost = vehicleRecords.length > 0 ? Math.round(totalCost / vehicleRecords.length) : 0;

            const costByCategory = {};
            vehicleRecords.forEach(r => { costByCategory[r.category] = (costByCategory[r.category] || 0) + r.cost; });

            document.getElementById('costStatsGrid').innerHTML = `
                <div class="stat-card"><div class="stat-label">総費用</div><div class="stat-value">¥${totalCost.toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">平均費用</div><div class="stat-value">¥${avgCost.toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">記録数</div><div class="stat-value">${vehicleRecords.length}</div></div>
            `;

            document.getElementById('categoryCosts').innerHTML = Object.entries(costByCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([category, cost]) => `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-weight: 600;">${escapeHtml(category)}</span>
                            <span style="color: var(--accent); font-weight: bold;">¥${cost.toLocaleString()}</span>
                        </div>
                        <div style="background: var(--light); border-radius: 8px; height: 20px; overflow: hidden;">
                            <div style="background: linear-gradient(90deg, var(--primary-light), var(--primary)); height: 100%; width: ${totalCost > 0 ? (cost / totalCost) * 100 : 0}%;"></div>
                        </div>
                    </div>
                `).join('');
        }

        function loadVehicleInfo() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;
            document.getElementById('vehicleName').value = vehicle.name;
            document.getElementById('vehicleType').value = vehicle.type;
            document.getElementById('vehicleMaker').value = vehicle.maker || '';
            document.getElementById('vehicleModel').value = vehicle.model || '';
            document.getElementById('vehicleYear').value = vehicle.year || '';
            document.getElementById('vehicleModelCode').value = vehicle.modelCode || '';
            document.getElementById('vehicleRegNumber').value = vehicle.regNumber || '';
            document.getElementById('vehicleInspectionDate').value = vehicle.inspectionDate || '';
            document.getElementById('vehicleMileage').value = vehicle.mileage;
        }

        // タブ切り替え
        function switchTab(tabName, e) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if (e && e.target) {
                const btn = e.target.closest('.tab-btn');
                if (btn) btn.classList.add('active');
            }
            window.scrollTo({ top: 0 });
        }

        // 整備記録追加
        async function addRecord(e) {
            e.preventDefault();
            const date = document.getElementById('recordDate').value;
            const cost = parseInt(document.getElementById('recordCost').value);
            const category = document.getElementById('recordCategory').value;
            const mileage = parseInt(document.getElementById('recordMileage').value) || 0;
            const notes = document.getElementById('recordNotes').value;

            appData.records.push({ id: Date.now(), vehicleId: appData.currentVehicleId, date, category, cost, mileage, notes });
            await saveData();
            document.getElementById('recordForm').reset();
            document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];
            renderRecords();
            updateDashboard();
            renderCosts();
        }

        // 整備記録削除
        async function deleteRecord(id) {
            if (confirm('この記録を削除してもよろしいですか？')) {
                appData.records = appData.records.filter(r => r.id !== id);
                await saveData();
                renderRecords();
                updateDashboard();
                renderCosts();
            }
        }

        // 車両追加
        async function addVehicle(e) {
            e.preventDefault();
            appData.vehicles.push({
                id: Date.now(),
                name: document.getElementById('newVehicleName').value,
                type: document.getElementById('newVehicleType').value,
                maker: document.getElementById('newVehicleMaker').value,
                model: document.getElementById('newVehicleModel').value,
                year: parseInt(document.getElementById('newVehicleYear').value) || new Date().getFullYear(),
                modelCode: document.getElementById('newVehicleModelCode').value,
                mileage: parseInt(document.getElementById('newVehicleMileage').value) || 0,
                regNumber: '',
                inspectionDate: document.getElementById('newVehicleInspectionDate').value
            });
            if (!appData.currentVehicleId) {
                appData.currentVehicleId = appData.vehicles[0].id;
            }
            await saveData();
            closeAddVehicleModal();
            renderAll();
        }

        // 車両情報更新
        async function updateVehicleInfo(e) {
            e.preventDefault();
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;
            vehicle.name = document.getElementById('vehicleName').value;
            vehicle.type = document.getElementById('vehicleType').value;
            vehicle.maker = document.getElementById('vehicleMaker').value;
            vehicle.model = document.getElementById('vehicleModel').value;
            vehicle.year = parseInt(document.getElementById('vehicleYear').value) || new Date().getFullYear();
            vehicle.modelCode = document.getElementById('vehicleModelCode').value;
            vehicle.regNumber = document.getElementById('vehicleRegNumber').value;
            vehicle.inspectionDate = document.getElementById('vehicleInspectionDate').value;
            vehicle.mileage = parseInt(document.getElementById('vehicleMileage').value);
            await saveData();
            renderVehicles();
            updateDashboard();
            alert('車両情報を更新しました');
        }

        function openAddVehicleModal() { document.getElementById('addVehicleModal').classList.add('active'); }
        function closeAddVehicleModal() {
            document.getElementById('addVehicleModal').classList.remove('active');
            document.getElementById('newVehicleForm').reset();
        }
    </script>
</body>
</html>
