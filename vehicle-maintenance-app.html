<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarLog - 車両整備管理システム</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --secondary: #059669;
            --accent: #f59e0b;
            --danger: #dc2626;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a2f5a 100%);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 30px 0;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(30, 58, 138, 0.3);
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 0.95em;
            opacity: 0.9;
        }

        /* Main Layout */
        .main-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar */
        .sidebar {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .sidebar h3 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .vehicle-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .vehicle-item {
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 0.95em;
        }

        .vehicle-item:hover {
            border-color: var(--primary-light);
            background: var(--light);
            transform: translateX(5px);
        }

        .vehicle-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            font-weight: 600;
        }

        .vehicle-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 8px;
        }

        .vehicle-name {
            flex: 1;
            font-weight: 500;
        }

        .vehicle-type {
            font-size: 0.85em;
            opacity: 0.8;
            padding: 3px 8px;
            background: var(--light);
            border-radius: 4px;
        }

        .vehicle-item.active .vehicle-type {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-add-vehicle {
            width: 100%;
            padding: 12px;
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .btn-add-vehicle:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        /* Content Area */
        .content {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            background: white;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 20px;
            background: transparent;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .tab-btn:hover {
            color: var(--primary);
            background: var(--light);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        .card-title {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--light) 0%, white 100%);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .stat-label {
            font-size: 0.9em;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: var(--primary);
        }

        /* Forms */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 0.95em;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 0.95em;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.95em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary-light);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
        }

        .btn-secondary {
            background: var(--secondary);
            color: white;
        }

        .btn-secondary:hover {
            background: #047857;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 8px 12px;
            font-size: 0.85em;
        }

        .btn-danger:hover {
            background: #991b1b;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* Records List */
        .records-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .record-item {
            border: 1px solid var(--border);
            padding: 18px;
            border-radius: 10px;
            background: var(--light);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .record-item:hover {
            border-color: var(--primary-light);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .record-date {
            font-weight: 600;
            color: var(--primary);
        }

        .record-cost {
            font-size: 1.2em;
            font-weight: bold;
            color: var(--accent);
        }

        .record-content {
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .record-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        /* Chart */
        .chart-container {
            background: var(--light);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            max-height: 400px;
            position: relative;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.8em;
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--text);
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(5, 150, 105, 0.1);
            color: var(--secondary);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--accent);
        }

        .badge-danger {
            background: rgba(220, 38, 38, 0.1);
            color: var(--danger);
        }

        /* Utility */
        .mt-20 {
            margin-top: 20px;
        }

        .text-center {
            text-align: center;
        }

        .flex {
            display: flex;
            gap: 10px;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Alert Banner */
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--accent);
            color: #92400e;
        }

        .alert-danger {
            background: rgba(220, 38, 38, 0.1);
            border-left: 4px solid var(--danger);
            color: #7f1d1d;
        }

        .alert-success {
            background: rgba(5, 150, 105, 0.1);
            border-left: 4px solid var(--secondary);
            color: #065f46;
        }

        .alert-icon {
            font-size: 1.5em;
            flex-shrink: 0;
        }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 3px;
        }

        .alert-message {
            font-size: 0.9em;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="container">
                <h1>🚗 CarLog</h1>
                <p>あなたの車両整備・費用管理システム</p>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-grid">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h3>🚙 車両一覧</h3>
                <div class="vehicle-list" id="vehicleList"></div>
                <button class="btn-add-vehicle" onclick="openAddVehicleModal()">+ 新しい車両を追加</button>
            </aside>

            <!-- Content -->
            <div class="content">
                <!-- Tabs -->
                <div class="tabs">
                    <button class="tab-btn active" onclick="switchTab('dashboard')">📊 ダッシュボード</button>
                    <button class="tab-btn" onclick="switchTab('records')">📝 整備記録</button>
                    <button class="tab-btn" onclick="switchTab('costs')">💰 費用分析</button>
                    <button class="tab-btn" onclick="switchTab('vehicle-info')">ℹ️ 車両情報</button>
                </div>

                <!-- Dashboard Tab -->
                <div id="dashboard" class="tab-content active">
                    <div id="inspectionAlert"></div>
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="card">
                        <div class="card-title">📈 過去12ヶ月の費用推移</div>
                        <div class="chart-container" id="chartContainer">
                            <canvas id="costChart" width="400" height="200"></canvas>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-title">🔧 最近の整備記録</div>
                        <div id="recentRecords"></div>
                    </div>
                </div>

                <!-- Records Tab -->
                <div id="records" class="tab-content">
                    <div class="card">
                        <div class="card-title">整備記録を追加</div>
                        <form id="recordForm" onsubmit="addRecord(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>整備日</label>
                                    <input type="date" id="recordDate" required>
                                </div>
                                <div class="form-group">
                                    <label>費用</label>
                                    <input type="number" id="recordCost" placeholder="0" min="0" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>カテゴリ</label>
                                <select id="recordCategory" required>
                                    <option value="">選択してください</option>
                                    <option value="オイル交換">オイル交換</option>
                                    <option value="タイヤ交換">タイヤ交換</option>
                                    <option value="点検">点検</option>
                                    <option value="修理">修理</option>
                                    <option value="カスタム">カスタム</option>
                                    <option value="パーツ交換">パーツ交換</option>
                                    <option value="その他">その他</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>走行距離（km）</label>
                                <input type="number" id="recordMileage" placeholder="0" min="0">
                            </div>
                            <div class="form-group">
                                <label>内容・メモ</label>
                                <textarea id="recordNotes" placeholder="整備内容の詳細..." rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">記録を保存</button>
                        </form>
                    </div>

                    <div class="card mt-20">
                        <div class="card-title">整備記録一覧</div>
                        <div class="records-list" id="recordsList"></div>
                    </div>
                </div>

                <!-- Costs Tab -->
                <div id="costs" class="tab-content">
                    <div class="card">
                        <div class="card-title">💰 費用分析</div>
                        <div class="stats-grid" id="costStatsGrid"></div>
                        <div class="mt-20">
                            <h3 style="color: var(--primary); margin-bottom: 15px;">カテゴリ別費用</h3>
                            <div id="categoryCosts"></div>
                        </div>
                    </div>
                </div>

                <!-- Vehicle Info Tab -->
                <div id="vehicle-info" class="tab-content">
                    <div class="card">
                        <div class="card-title">🚗 車両情報</div>
                        <form id="vehicleForm" onsubmit="updateVehicleInfo(event)">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>車両名</label>
                                    <input type="text" id="vehicleName" required>
                                </div>
                                <div class="form-group">
                                    <label>車種</label>
                                    <select id="vehicleType" required>
                                        <option value="">選択してください</option>
                                        <option value="軽自動車">軽自動車</option>
                                        <option value="普通自動車">普通自動車</option>
                                        <option value="SUV">SUV</option>
                                        <option value="バイク">バイク</option>
                                        <option value="その他">その他</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>メーカー</label>
                                    <input type="text" id="vehicleMaker" placeholder="例：トヨタ">
                                </div>
                                <div class="form-group">
                                    <label>モデル</label>
                                    <input type="text" id="vehicleModel" placeholder="例：アクア">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>年式</label>
                                    <input type="number" id="vehicleYear" placeholder="2020" min="1900">
                                </div>
                                <div class="form-group">
                                    <label>型式</label>
                                    <input type="text" id="vehicleModelCode" placeholder="例：ZVW50">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>ナンバープレート</label>
                                    <input type="text" id="vehicleRegNumber" placeholder="例：○○-1234">
                                </div>
                                <div class="form-group">
                                    <label>次回車検日</label>
                                    <input type="date" id="vehicleInspectionDate">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>現在の走行距離（km）</label>
                                <input type="number" id="vehicleMileage" placeholder="0" min="0" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">情報を更新</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Vehicle Modal -->
    <div class="modal" id="addVehicleModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeAddVehicleModal()">×</button>
            <div class="modal-header">新しい車両を追加</div>
            <form id="newVehicleForm" onsubmit="addVehicle(event)">
                <div class="form-group">
                    <label>車両名</label>
                    <input type="text" id="newVehicleName" placeholder="例：my-car-1" required>
                </div>
                <div class="form-group">
                    <label>車種</label>
                    <select id="newVehicleType" required>
                        <option value="">選択してください</option>
                        <option value="軽自動車">軽自動車</option>
                        <option value="普通自動車">普通自動車</option>
                        <option value="SUV">SUV</option>
                        <option value="バイク">バイク</option>
                        <option value="その他">その他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>メーカー</label>
                    <input type="text" id="newVehicleMaker" placeholder="例：トヨタ">
                </div>
                <div class="form-group">
                    <label>モデル</label>
                    <input type="text" id="newVehicleModel" placeholder="例：アクア">
                </div>
                <div class="form-group">
                    <label>型式</label>
                    <input type="text" id="newVehicleModelCode" placeholder="例：ZVW50">
                </div>
                <div class="form-group">
                    <label>次回車検日</label>
                    <input type="date" id="newVehicleInspectionDate">
                </div>
                <div class="form-group">
                    <label>現在の走行距離（km）</label>
                    <input type="number" id="newVehicleMileage" placeholder="0" min="0" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">車両を追加</button>
            </form>
        </div>
    </div>

    <script>
        // データ管理
        let appData = {
            vehicles: [],
            records: [],
            currentVehicleId: null
        };

        // localStorage からデータを読み込む
        function loadData() {
            const saved = localStorage.getItem('carLogData');
            if (saved) {
                appData = JSON.parse(saved);
            } else {
                // デモデータ
                appData.vehicles = [
                    { id: 1, name: 'トヨタ プリウス', type: '普通自動車', maker: 'トヨタ', model: 'プリウス', modelCode: 'ZVW50', year: 2020, mileage: 45000, regNumber: '東京-1234', inspectionDate: '2025-06-15' },
                    { id: 2, name: 'スズキ ジムニー', type: 'SUV', maker: 'スズキ', model: 'ジムニー', modelCode: 'JB74W', year: 2021, mileage: 32000, regNumber: '東京-5678', inspectionDate: '2026-03-20' }
                ];
                appData.records = [
                    { id: 1, vehicleId: 1, date: '2024-03-15', category: 'オイル交換', cost: 5000, mileage: 45000, notes: 'オイルチェンジ' },
                    { id: 2, vehicleId: 1, date: '2024-02-20', category: 'タイヤ交換', cost: 60000, mileage: 44500, notes: '夏タイヤに交換' },
                    { id: 3, vehicleId: 2, date: '2024-03-10', category: 'カスタム', cost: 25000, mileage: 32000, notes: 'オフロード用サスペンション装着' }
                ];
                appData.currentVehicleId = 1;
            }
        }

        function saveData() {
            localStorage.setItem('carLogData', JSON.stringify(appData));
        }

        // UI レンダリング
        function renderVehicles() {
            const list = document.getElementById('vehicleList');
            list.innerHTML = appData.vehicles.map(v => `
                <div class="vehicle-item ${v.id === appData.currentVehicleId ? 'active' : ''}" onclick="selectVehicle(${v.id})">
                    <div class="vehicle-info">
                        <div class="vehicle-name">${v.name}</div>
                        <div class="vehicle-type">${v.type}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectVehicle(id) {
            appData.currentVehicleId = id;
            saveData();
            renderVehicles();
            updateDashboard();
            renderRecords();
            renderCosts();
            loadVehicleInfo();
        }

        function updateDashboard() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            const vehicleRecords = appData.records.filter(r => r.vehicleId === vehicle.id);
            const totalCost = vehicleRecords.reduce((sum, r) => sum + r.cost, 0);
            const monthRecords = vehicleRecords.filter(r => {
                const date = new Date(r.date);
                const now = new Date();
                return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
            });
            const monthCost = monthRecords.reduce((sum, r) => sum + r.cost, 0);

            // 車検日の通知
            const inspectionAlert = document.getElementById('inspectionAlert');
            if (vehicle.inspectionDate) {
                const inspectionDate = new Date(vehicle.inspectionDate);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const daysUntilInspection = Math.floor((inspectionDate - today) / (1000 * 60 * 60 * 24));
                
                let alertHTML = '';
                if (daysUntilInspection < 0) {
                    alertHTML = `
                        <div class="alert alert-danger">
                            <div class="alert-icon">⚠️</div>
                            <div class="alert-content">
                                <div class="alert-title">車検が期限切れです！</div>
                                <div class="alert-message">車検日：${vehicle.inspectionDate} - 早急に手続きを進めてください</div>
                            </div>
                        </div>
                    `;
                } else if (daysUntilInspection === 0) {
                    alertHTML = `
                        <div class="alert alert-danger">
                            <div class="alert-icon">🚨</div>
                            <div class="alert-content">
                                <div class="alert-title">本日が車検日です！</div>
                                <div class="alert-message">車検手続きを忘れずに行ってください</div>
                            </div>
                        </div>
                    `;
                } else if (daysUntilInspection <= 30) {
                    alertHTML = `
                        <div class="alert alert-danger">
                            <div class="alert-icon">⚠️</div>
                            <div class="alert-content">
                                <div class="alert-title">車検期限まで${daysUntilInspection}日です！</div>
                                <div class="alert-message">車検日：${vehicle.inspectionDate} - 早めに予約することをお勧めします</div>
                            </div>
                        </div>
                    `;
                } else if (daysUntilInspection <= 60) {
                    alertHTML = `
                        <div class="alert alert-warning">
                            <div class="alert-icon">ℹ️</div>
                            <div class="alert-content">
                                <div class="alert-title">車検期限まで${daysUntilInspection}日です</div>
                                <div class="alert-message">車検日：${vehicle.inspectionDate} - そろそろ予約の準備をしましょう</div>
                            </div>
                        </div>
                    `;
                } else if (daysUntilInspection <= 90) {
                    alertHTML = `
                        <div class="alert alert-success">
                            <div class="alert-icon">✓</div>
                            <div class="alert-content">
                                <div class="alert-title">次の車検まで${daysUntilInspection}日あります</div>
                                <div class="alert-message">車検日：${vehicle.inspectionDate}</div>
                            </div>
                        </div>
                    `;
                }
                inspectionAlert.innerHTML = alertHTML;
            } else {
                inspectionAlert.innerHTML = `
                    <div class="alert alert-warning">
                        <div class="alert-icon">⚠️</div>
                        <div class="alert-content">
                            <div class="alert-title">車検日が登録されていません</div>
                            <div class="alert-message">車両情報から次回車検日を設定してください</div>
                        </div>
                    </div>
                `;
            }

            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">現在の走行距離</div>
                    <div class="stat-value">${vehicle.mileage.toLocaleString()} km</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">総整備費用</div>
                    <div class="stat-value">¥${totalCost.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">今月の費用</div>
                    <div class="stat-value">¥${monthCost.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">整備記録数</div>
                    <div class="stat-value">${vehicleRecords.length}</div>
                </div>
            `;

            // 最近の記録
            const recentRecords = document.getElementById('recentRecords');
            if (vehicleRecords.length === 0) {
                recentRecords.innerHTML = '<div class="empty-state"><p>整備記録がありません</p></div>';
            } else {
                recentRecords.innerHTML = vehicleRecords.slice(0, 3).map(r => `
                    <div class="record-item">
                        <div class="record-header">
                            <div>
                                <div class="record-date">${r.date}</div>
                                <span class="record-category">${r.category}</span>
                            </div>
                            <div class="record-cost">¥${r.cost.toLocaleString()}</div>
                        </div>
                        <div class="record-content">${r.notes}</div>
                        <small style="color: var(--text-muted);">走行距離: ${r.mileage} km</small>
                    </div>
                `).join('');
            }
        }

        function renderRecords() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            const vehicleRecords = appData.records.filter(r => r.vehicleId === vehicle.id);
            const recordsList = document.getElementById('recordsList');

            if (vehicleRecords.length === 0) {
                recordsList.innerHTML = '<div class="empty-state"><h3>整備記録がありません</h3><p>最初の整備記録を追加しましょう</p></div>';
            } else {
                recordsList.innerHTML = vehicleRecords.reverse().map(r => `
                    <div class="record-item">
                        <div class="record-header">
                            <div>
                                <div class="record-date">${r.date}</div>
                                <span class="record-category">${r.category}</span>
                            </div>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div class="record-cost">¥${r.cost.toLocaleString()}</div>
                                <button class="btn btn-danger" onclick="deleteRecord(${r.id})">削除</button>
                            </div>
                        </div>
                        <div class="record-content">${r.notes}</div>
                        <small style="color: var(--text-muted);">走行距離: ${r.mileage} km</small>
                    </div>
                `).join('');
            }
        }

        function renderCosts() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            const vehicleRecords = appData.records.filter(r => r.vehicleId === vehicle.id);
            const totalCost = vehicleRecords.reduce((sum, r) => sum + r.cost, 0);
            const avgCost = vehicleRecords.length > 0 ? Math.round(totalCost / vehicleRecords.length) : 0;

            // カテゴリ別費用
            const costByCategory = {};
            vehicleRecords.forEach(r => {
                costByCategory[r.category] = (costByCategory[r.category] || 0) + r.cost;
            });

            const costStatsGrid = document.getElementById('costStatsGrid');
            costStatsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">総費用</div>
                    <div class="stat-value">¥${totalCost.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均費用</div>
                    <div class="stat-value">¥${avgCost.toLocaleString()}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">記録数</div>
                    <div class="stat-value">${vehicleRecords.length}</div>
                </div>
            `;

            const categoryCosts = document.getElementById('categoryCosts');
            categoryCosts.innerHTML = Object.entries(costByCategory)
                .sort((a, b) => b[1] - a[1])
                .map(([category, cost]) => `
                    <div style="margin-bottom: 15px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-weight: 600;">${category}</span>
                            <span style="color: var(--accent); font-weight: bold;">¥${cost.toLocaleString()}</span>
                        </div>
                        <div style="background: var(--light); border-radius: 8px; height: 20px; overflow: hidden;">
                            <div style="background: linear-gradient(90deg, var(--primary-light), var(--primary)); height: 100%; width: ${(cost / totalCost) * 100}%;" />
                        </div>
                    </div>
                `).join('');
        }

        function loadVehicleInfo() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            document.getElementById('vehicleName').value = vehicle.name;
            document.getElementById('vehicleType').value = vehicle.type;
            document.getElementById('vehicleMaker').value = vehicle.maker || '';
            document.getElementById('vehicleModel').value = vehicle.model || '';
            document.getElementById('vehicleYear').value = vehicle.year || '';
            document.getElementById('vehicleModelCode').value = vehicle.modelCode || '';
            document.getElementById('vehicleRegNumber').value = vehicle.regNumber || '';
            document.getElementById('vehicleInspectionDate').value = vehicle.inspectionDate || '';
            document.getElementById('vehicleMileage').value = vehicle.mileage;
        }

        // イベントハンドラー
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function addRecord(e) {
            e.preventDefault();
            const date = document.getElementById('recordDate').value;
            const cost = parseInt(document.getElementById('recordCost').value);
            const category = document.getElementById('recordCategory').value;
            const mileage = parseInt(document.getElementById('recordMileage').value) || 0;
            const notes = document.getElementById('recordNotes').value;

            appData.records.push({
                id: Date.now(),
                vehicleId: appData.currentVehicleId,
                date,
                category,
                cost,
                mileage,
                notes
            });

            saveData();
            document.getElementById('recordForm').reset();
            renderRecords();
            updateDashboard();
            renderCosts();
        }

        function deleteRecord(id) {
            if (confirm('この記録を削除してもよろしいですか？')) {
                appData.records = appData.records.filter(r => r.id !== id);
                saveData();
                renderRecords();
                updateDashboard();
                renderCosts();
            }
        }

        function addVehicle(e) {
            e.preventDefault();
            appData.vehicles.push({
                id: Date.now(),
                name: document.getElementById('newVehicleName').value,
                type: document.getElementById('newVehicleType').value,
                maker: document.getElementById('newVehicleMaker').value,
                model: document.getElementById('newVehicleModel').value,
                modelCode: document.getElementById('newVehicleModelCode').value,
                mileage: parseInt(document.getElementById('newVehicleMileage').value),
                year: 2024,
                regNumber: '',
                inspectionDate: document.getElementById('newVehicleInspectionDate').value
            });

            saveData();
            closeAddVehicleModal();
            renderVehicles();
        }

        function updateVehicleInfo(e) {
            e.preventDefault();
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle) return;

            vehicle.name = document.getElementById('vehicleName').value;
            vehicle.type = document.getElementById('vehicleType').value;
            vehicle.maker = document.getElementById('vehicleMaker').value;
            vehicle.model = document.getElementById('vehicleModel').value;
            vehicle.year = parseInt(document.getElementById('vehicleYear').value) || 2024;
            vehicle.modelCode = document.getElementById('vehicleModelCode').value;
            vehicle.regNumber = document.getElementById('vehicleRegNumber').value;
            vehicle.inspectionDate = document.getElementById('vehicleInspectionDate').value;
            vehicle.mileage = parseInt(document.getElementById('vehicleMileage').value);

            saveData();
            renderVehicles();
            updateDashboard();
            alert('車両情報を更新しました');
        }

        function openAddVehicleModal() {
            document.getElementById('addVehicleModal').classList.add('active');
        }

        function closeAddVehicleModal() {
            document.getElementById('addVehicleModal').classList.remove('active');
            document.getElementById('newVehicleForm').reset();
        }

        // 初期化
        function init() {
            loadData();
            renderVehicles();
            updateDashboard();
            renderRecords();
            renderCosts();
            loadVehicleInfo();

            // 今日の日付をデフォルトに
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('recordDate').value = today;

            // ブラウザ通知の許可をリクエスト
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }

            // 1時間ごとに車検日をチェック
            setInterval(checkInspectionDates, 60 * 60 * 1000);
        }

        // 車検日チェックと通知
        function checkInspectionDates() {
            const vehicle = appData.vehicles.find(v => v.id === appData.currentVehicleId);
            if (!vehicle || !vehicle.inspectionDate) return;

            const inspectionDate = new Date(vehicle.inspectionDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const daysUntilInspection = Math.floor((inspectionDate - today) / (1000 * 60 * 60 * 24));

            // ブラウザ通知を送信
            if (Notification.permission === 'granted') {
                if (daysUntilInspection === 60) {
                    new Notification('車検まで2ヶ月です！', {
                        body: `${vehicle.name}の車検日は${vehicle.inspectionDate}です。そろそろ予約しましょう。`,
                        icon: '🚗'
                    });
                } else if (daysUntilInspection === 30) {
                    new Notification('車検まで1ヶ月です！', {
                        body: `${vehicle.name}の車検日は${vehicle.inspectionDate}です。予約してください。`,
                        icon: '⚠️'
                    });
                } else if (daysUntilInspection === 0) {
                    new Notification('本日が車検日です！', {
                        body: `${vehicle.name}の車検手続きを忘れずに行ってください。`,
                        icon: '🚨'
                    });
                }
            }
        }

        init();
    </script>
</body>
</html>
